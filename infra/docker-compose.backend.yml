services:
  postgres:
    image: postgis/postgis:17-3.5
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-heatmap}
      POSTGRES_USER: ${POSTGRES_USER:-heatmap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-heatmap}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    command: ["/bin/sh", "-lc", "./eu-hz-api migrate-up && ./eu-hz-api serve"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://heatmap:heatmap@postgres:5432/heatmap?sslmode=disable}
      PORT: ${PORT:-8080}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_REQUEST_TIMEOUT: ${API_REQUEST_TIMEOUT:-30s}
      INGEST_KEY: ${INGEST_KEY:-change-me}
      INGEST_MODEL: ${INGEST_MODEL:-opencode/deepseek-v4-flash-free}
      INGEST_INTERVAL: ${INGEST_INTERVAL:-24h}
      INGEST_TIMEOUT: ${INGEST_TIMEOUT:-15m}
      INGEST_FAILURE_THRESHOLD: ${INGEST_FAILURE_THRESHOLD:-3}
      INGEST_FAILURE_COOLDOWN: ${INGEST_FAILURE_COOLDOWN:-1h}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-}

  worker:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    command: ["./eu-hz-api", "ingest-loop"]
    restart: unless-stopped
    profiles:
      - ingest
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://heatmap:heatmap@postgres:5432/heatmap?sslmode=disable}
      PORT: ${PORT:-8080}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_REQUEST_TIMEOUT: ${API_REQUEST_TIMEOUT:-30s}
      INGEST_KEY: ${INGEST_KEY:-change-me}
      INGEST_MODEL: ${INGEST_MODEL:-opencode/deepseek-v4-flash-free}
      INGEST_INTERVAL: ${INGEST_INTERVAL:-24h}
      INGEST_TIMEOUT: ${INGEST_TIMEOUT:-15m}
      INGEST_FAILURE_THRESHOLD: ${INGEST_FAILURE_THRESHOLD:-3}
      INGEST_FAILURE_COOLDOWN: ${INGEST_FAILURE_COOLDOWN:-1h}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-}
volumes:
  postgres_data:
