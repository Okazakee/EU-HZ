services:
  postgres:
    image: postgis/postgis:17-3.5
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-heatmap}
      POSTGRES_USER: ${POSTGRES_USER:-heatmap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-heatmap}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    network_mode: host
    command: ["/bin/sh", "-lc", "./eu-hz-api migrate-up && ./eu-hz-api serve"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://heatmap:heatmap@postgres:5432/heatmap?sslmode=disable}
      PORT: ${PORT:-8080}
      INGEST_KEY: ${INGEST_KEY:-change-me}
      INGEST_MODEL: ${INGEST_MODEL:-opencode/deepseek-v4-flash-free}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
volumes:
  postgres_data:
